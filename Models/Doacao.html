<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação | Biblioteca Comunitária</title>
    <link rel="stylesheet" href="../Styles/style_principal.css">
    <link rel="stylesheet" href="../Styles/Style_Doacao.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a class="brand" href="Home.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            Biblioteca Comunitária
        </a>
        <ul class="nav-links">
            <li><a href="Home.html">Início</a></li>
            <li><a href="acervo.html">Acervo</a></li>
            <li><a href="Doacao.html" class="active">Doar</a></li>
            <li><a href="cadastro.html">Cadastro</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <main class="container form-page">
        <div class="form-intro">
            <span class="eyebrow">Doe um livro</span>
            <h1>Preencha as informações para a doação</h1>
            <p>Seus livros podem ganhar novos leitores. Conte para nós o que você gostaria de doar.</p>
        </div>

        <div class="form-card">
            <form id="frmDoacao">
                <div class="field">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Informe o seu nome">
                </div>

                <div class="field">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="Informe o seu telefone">
                </div>

                <div class="field">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Informe o seu e-mail">
                </div>

                <div class="field">
                    <label for="tituloLivro">Título do livro</label>
                    <input type="text" id="tituloLivro" name="nomeLivro" placeholder="Informe o nome do livro">
                </div>

                <div class="field">
                    <label for="autorLivro">Autor do livro</label>
                    <input type="text" id="autorLivro" name="autorLivro" placeholder="Informe o autor do livro">
                </div>

                <button type="submit" class="btn">Enviar doação</button>
                <p id="msgStatus" class="msg-status"></p>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        Biblioteca Comunitária &middot; Conhecimento aberto para todos
    </footer>

    <script src="../Scripts/storage.js"></script>
    <script src="../Scripts/doacao.js"></script>
</body>
</html>
