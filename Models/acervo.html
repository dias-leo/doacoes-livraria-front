<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/style_principal.css">
    <link rel="stylesheet" href="../Styles/style_acervo.css">
    <title>Acervo | Biblioteca Comunitária</title>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a class="brand" href="Home.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>

        <ul class="nav-links">

            <li><a href="acervo.html" class="active">Acervo</a></li>

            <li><a href="cadastro.html">Cadastro</a></li>

    <main class="container acervo">
        <header class="acervo-header">
            <span class="eyebrow">Nosso acervo</span>
            <h1>Encontre seu próximo livro</h1>
            <div class="search-box">
                <input type="text" id="busca" placeholder="Pesquisar livro ou autor...">
                <button class="btn" onclick="buscarLivros()">Pesquisar</button>
            </div>

        <div id="lista-livros"></div>

        <div class="paginacao">
            <button class="btn btn-outline" onclick="paginaAnterior()">Anterior</button>
            <button class="btn btn-outline" onclick="proximaPagina()">Próxima</button>
        </div>

    <footer class="site-footer">
        Biblioteca Comunitária &middot; Conhecimento aberto para todos
    </footer>
