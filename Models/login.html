<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Biblioteca Comunitária</title>
    <link rel="stylesheet" href="../Styles/style_principal.css">
    <link rel="stylesheet" href="../Styles/style_login.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a class="brand" href="Home.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            Biblioteca Comunitária
        </a>
        <ul class="nav-links">
            <li><a href="Home.html">Início</a></li>
            <li><a href="acervo.html">Acervo</a></li>
            <li><a href="Doacao.html">Doar</a></li>
            <li><a href="cadastro.html">Cadastro</a></li>
            <li><a href="login.html" class="active">Login</a></li>
        </ul>
    </nav>

    <main class="container form-page">
        <div class="form-intro">
            <span class="eyebrow">Bem-vindo de volta</span>
            <h1>Login</h1>
            <p>Acesse sua conta para reservar livros e acompanhar suas leituras.</p>
        </div>

        <div class="form-card">
            <form id="frmPrincipal">
                <div class="field">
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="seu@email.com">
                </div>

                <div class="field">
                    <label for="cpf">CPF</label>
                    <input type="password" name="cpf" id="cpf" placeholder="Informe o seu CPF">
                </div>

                <button type="submit" id="btnEntrar" class="btn">Entrar</button>
                <p id="mensagemErro" class="msg-status"></p>
            </form>
            <p class="form-footer-link">Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a>.</p>
        </div>
    </main>

    <footer class="site-footer">
        Biblioteca Comunitária &middot; Conhecimento aberto para todos
    </footer>

    <script src="../Scripts/storage.js"></script>
    <script src="../Scripts/login.js"></script>
</body>
</html>
