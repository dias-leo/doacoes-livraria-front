<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/style_principal.css">
    <link rel="stylesheet" href="../Styles/style_Cadastro.css">
    <title>Cadastro | Biblioteca Comunitária</title>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a class="brand" href="Home.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            Biblioteca Comunitária
        </a>
        <ul class="nav-links">
            <li><a href="Home.html">Início</a></li>
            <li><a href="acervo.html">Acervo</a></li>
            <li><a href="Doacao.html">Doar</a></li>
            <li><a href="cadastro.html" class="active">Cadastro</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <main class="container form-page">
        <div class="form-intro">
            <span class="eyebrow">Crie sua conta</span>
            <h1>Dados de cadastro</h1>
            <p>Cadastre-se para reservar livros e fazer parte da nossa comunidade de leitores.</p>
        </div>

        <div class="form-card">
            <form id="frmCadastro">
                <div class="field">
                    <label for="nome">Nome</label>
                    <input id="nome" placeholder="Nome completo">
                </div>

                <div class="field">
                    <label for="email">E-mail</label>
                    <input id="email" type="email" placeholder="seu@email.com">
                </div>

                <div class="field">
                    <label for="telefone">Telefone</label>
                    <input id="telefone" type="tel" placeholder="Somente números">
                </div>

                <div class="field">
                    <label for="cpf">CPF</label>
                    <input id="cpf" type="text" placeholder="Somente números">
                </div>

                <button id="btnEnviar" type="submit" class="btn">Enviar</button>
                <p id="msgStatus" class="msg-status"></p>
            </form>
            <p class="form-footer-link">Já tem uma conta? <a href="login.html">Faça login aqui</a>.</p>
        </div>
    </main>

    <footer class="site-footer">
        Biblioteca Comunitária &middot; Conhecimento aberto para todos
    </footer>

    <script src="../Scripts/storage.js"></script>
    <script src="../Scripts/cadastro.js"></script>
</body>
</html>
